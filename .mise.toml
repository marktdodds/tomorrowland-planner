[tools]
node = "20.18.1"

[env]
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install dependencies"
run = "npm install"

[tasks.dev]
description = "Start the Vite dev server"
run = "npm run dev"

[tasks.build]
description = "Build for production"
run = "npm run build"

[tasks.preview]
description = "Preview the production build"
run = "npm run preview"

[tasks.lint]
description = "Run ESLint"
run = "npm run lint"
